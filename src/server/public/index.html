<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openstacks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --cyan: #56d4f0;
      --green: #3fb950;
      --red: #f85149;
      --dim: #484f58;
      --border: #30363d;
      --input-bg: #161b22;
      --purple: #a371f7;
    }
    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); }
    body { display: flex; align-items: center; justify-content: center; }

    #terminal {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      font-family: Menlo, Monaco, 'Courier New', monospace;
      font-size: 13px; line-height: 1.6;
      border: 1px solid var(--border);
    }

    #titlebar {
      display: flex; align-items: center;
      padding: 0 12px; height: 28px; min-height: 28px;
      background: #161b22; border-bottom: 1px solid var(--border);
      color: var(--dim); font-size: 12px; user-select: none;
    }
    #titlebar .title { flex: 1; }
    #titlebar .controls { display: flex; gap: 8px; font-size: 12px; }
    #titlebar .controls span { cursor: default; }

    #connect-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px; min-height: 32px;
      background: var(--input-bg); border-bottom: 1px solid var(--border);
      font-size: 12px; flex-wrap: wrap;
    }
    #connect-bar .label { color: var(--dim); user-select: none; }
    #ws-url {
      flex: 1; border: 1px solid var(--border); outline: none;
      background: var(--bg); color: var(--text); padding: 2px 8px;
      font-family: inherit; font-size: 12px; border-radius: 2px; min-width: 120px;
    }
    #ws-url:focus { border-color: var(--cyan); }
    #connect-btn {
      padding: 2px 12px; background: var(--green); color: var(--bg);
      border: none; font-family: inherit; font-size: 12px; font-weight: bold;
      cursor: pointer; border-radius: 2px;
    }
    #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #connect-btn.connected { background: var(--dim); }
    #status { font-size: 11px; min-width: 60px; }
    #status.connected { color: var(--green); }
    #status.disconnected { color: var(--red); }
    #status.connecting { color: var(--cyan); }

    #key-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; min-height: 28px;
      background: var(--input-bg); border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    #key-row .label { color: var(--dim); user-select: none; }
    #api-key-input-wrapper {
      position: relative; display: flex; align-items: center;
    }
    #api-key-input {
      border: 1px solid var(--border); outline: none;
      background: var(--bg); color: var(--text); padding: 2px 28px 2px 8px;
      font-family: inherit; font-size: 12px; border-radius: 2px; width: 280px;
    }
    #api-key-input:focus { border-color: var(--cyan); }
    #api-key-toggle {
      position: absolute; right: 4px;
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 12px; padding: 0 2px;
    }
    #api-key-toggle:hover { color: var(--text); }
    #set-key-btn {
      padding: 2px 10px; background: var(--purple); color: #fff;
      border: none; font-family: inherit; font-size: 12px; font-weight: bold;
      cursor: pointer; border-radius: 2px;
    }
    #set-key-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #set-key-btn.set { background: var(--dim); }
    #key-status { font-size: 11px; color: var(--dim); min-width: 80px; }
    #key-status.has-key { color: var(--green); }

    #output {
      flex: 1; overflow-y: auto; padding: 8px 14px;
    }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: var(--bg); }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .line { white-space: pre-wrap; word-break: break-word; min-height: 1.6em; }
    .line.user { color: var(--cyan); }
    .line.assistant { color: var(--text); }
    .line.system { color: var(--dim); }
    .line.error { color: var(--red); }
    .line.empty { min-height: 0.8em; }

    .block-cursor {
      display: inline; background: var(--text); color: var(--bg);
      animation: blink-cursor 1s step-end infinite;
    }
    @keyframes blink-cursor {
      0%, 100% { background: var(--text); color: var(--bg); }
      50% { background: transparent; color: var(--text); }
    }

    #input-line {
      display: flex; align-items: center;
      padding: 4px 14px 8px;
      background: var(--bg);
    }
    #input-label { color: var(--green); font-weight: bold; margin-right: 6px; user-select: none; }
    #prompt-input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
      font-family: inherit; font-size: inherit; line-height: inherit;
      caret-color: var(--text);
    }
    #prompt-input::placeholder { color: var(--dim); }
    #prompt-input:disabled { opacity: 0.4; }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="titlebar">
      <div class="title">openstacks v0.1</div>
      <div class="controls"><span>&#x2500;</span><span>&#x25A1;</span><span>&#x2715;</span></div>
    </div>
    <div id="connect-bar">
      <label for="ws-url" class="label">ws://</label>
      <input id="ws-url" type="text" placeholder="host:port  (e.g. localhost:3000)" autocomplete="off" spellcheck="false" />
      <button id="connect-btn">connect</button>
      <span id="status" class="disconnected">disconnected</span>
    </div>
    <div id="key-row">
      <span class="label">key:</span>
      <div id="api-key-input-wrapper">
        <label for="api-key-input" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">API Key</label>
        <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
        <button id="api-key-toggle" title="show/hide">&#x1F512;</button>
      </div>
      <button id="set-key-btn">set</button>
      <span id="key-status"></span>
    </div>
    <div id="output"></div>
    <div id="input-line">
      <span id="input-label">&gt;</span>
      <input id="prompt-input" type="text" placeholder="type a prompt..." autocomplete="off" spellcheck="false" disabled />
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const promptInput = document.getElementById('prompt-input');
    const wsUrlInput = document.getElementById('ws-url');
    const connectBtn = document.getElementById('connect-btn');
    const statusEl = document.getElementById('status');
    const apiKeyInput = document.getElementById('api-key-input');
    const apiKeyToggle = document.getElementById('api-key-toggle');
    const setKeyBtn = document.getElementById('set-key-btn');
    const keyStatus = document.getElementById('key-status');

    let ws = null;
    let streaming = false;
    let currentLine = null;
    let currentText = '';

    const isGitHubPages = location.hostname.endsWith('github.io');
    const FLYIO_HOST = 'openstacks.fly.dev';

    const params = new URLSearchParams(location.search);
    if (params.has('host')) {
      wsUrlInput.value = params.get('host');
    } else if (isGitHubPages) {
      wsUrlInput.value = FLYIO_HOST;
    } else if (location.protocol === 'file:') {
      wsUrlInput.value = 'localhost:3000';
    } else {
      wsUrlInput.value = location.host;
    }

    const savedKey = sessionStorage.getItem('openstacks_api_key');
    if (savedKey) {
      apiKeyInput.value = savedKey;
      keyStatus.textContent = 'stored';
      keyStatus.className = 'has-key';
    }

    async function detectWsProtocol() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        return data.wsProtocol || 'ws';
      } catch {
        return 'ws';
      }
    }

    async function autoConnect() {
      if (isGitHubPages) {
        const proto = await detectWsProtocol();
        wsUrlInput.value = proto + '://' + wsUrlInput.value.replace(/^wss?:\/\//, '');
      }
      connect();
    }

    function toggleApiKeyVisibility() {
      if (apiKeyInput.type === 'password') {
        apiKeyInput.type = 'text';
        apiKeyToggle.textContent = '\uD83D\uDD13';
      } else {
        apiKeyInput.type = 'password';
        apiKeyToggle.textContent = '\uD83D\uDD12';
      }
    }
    apiKeyToggle.addEventListener('click', toggleApiKeyVisibility);

    async function setApiKey() {
      const key = apiKeyInput.value.trim();
      if (!key) return;
      setKeyBtn.disabled = true;
      try {
        const res = await fetch('/api/key', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: key })
        });
        if (res.ok) {
          sessionStorage.setItem('openstacks_api_key', key);
          keyStatus.textContent = 'stored';
          keyStatus.className = 'has-key';
          setKeyBtn.textContent = 'set';
          setKeyBtn.className = 'set';
          addSystemLine('api key stored in sessionStorage');
        } else {
          addLine('error', 'failed to set api key');
        }
      } catch (e) {
        addLine('error', 'failed to set api key: ' + e.message);
      }
      setKeyBtn.disabled = false;
    }
    setKeyBtn.addEventListener('click', setApiKey);

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); setApiKey(); }
    });

    function setStatus(state, text) {
      statusEl.className = state;
      statusEl.textContent = text;
    }
    setStatus('disconnected', 'disconnected');

    function addLine(className, text) {
      const el = document.createElement('div');
      el.className = 'line ' + className;
      el.textContent = text;
      output.appendChild(el);
      output.scrollTop = output.scrollHeight;
      return el;
    }

    function addSystemLine(text) {
      const el = addLine('system', text);
      return el;
    }

    function addEmptyLine() {
      const el = document.createElement('div');
      el.className = 'line empty';
      output.appendChild(el);
      return el;
    }

    function addUserPrompt(text) {
      addLine('user', '> ' + text);
    }

    function addEmptyAndScroll() {
      addEmptyLine();
      output.scrollTop = output.scrollHeight;
    }

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        ws.close();
        return;
      }

      let url = wsUrlInput.value.trim();
      if (!url) return;
      if (!url.startsWith('ws://') && !url.startsWith('wss://')) {
        url = 'ws://' + url;
      }
      addSystemLine('connecting to ' + url + '...');
      setStatus('connecting', 'connecting...');
      connectBtn.disabled = true;

      ws = new WebSocket(url);

      ws.onopen = () => {
        setStatus('connected', 'connected');
        connectBtn.textContent = 'disconnect';
        connectBtn.className = 'connected';
        connectBtn.disabled = false;
        promptInput.disabled = false;
        promptInput.focus();
        addSystemLine('connected');
        addEmptyAndScroll();
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'start') {
          currentLine = addLine('assistant', '');
          currentText = '';
          streaming = true;
        } else if (msg.type === 'text' && currentLine) {
          currentText += msg.text;
          currentLine.innerHTML = '';
          currentLine.appendChild(document.createTextNode(currentText));
          const cursor = document.createElement('span');
          cursor.className = 'block-cursor';
          cursor.textContent = '\u2588';
          currentLine.appendChild(cursor);
          output.scrollTop = output.scrollHeight;
        } else if (msg.type === 'end') {
          if (currentLine) {
            currentLine.innerHTML = '';
            currentLine.textContent = currentText;
          }
          currentLine = null;
          currentText = '';
          streaming = false;
          addEmptyAndScroll();
          promptInput.disabled = false;
          promptInput.focus();
        } else if (msg.type === 'error') {
          if (currentLine) {
            currentLine.remove();
            currentLine = null;
          }
          addLine('error', 'error: ' + msg.message);
          addEmptyAndScroll();
          streaming = false;
          promptInput.disabled = false;
          promptInput.focus();
        }
      };

      ws.onclose = () => {
        setStatus('disconnected', 'disconnected');
        connectBtn.textContent = 'connect';
        connectBtn.className = '';
        connectBtn.disabled = false;
        promptInput.disabled = true;
        addSystemLine('disconnected');
        addEmptyAndScroll();
      };

      ws.onerror = () => {
        setStatus('disconnected', 'error');
        addLine('error', 'connection failed');
        addEmptyAndScroll();
        connectBtn.disabled = false;
      };
    }

    connectBtn.addEventListener('click', connect);

    wsUrlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });

    function submit() {
      const text = promptInput.value.trim();
      if (!text || streaming || !ws || ws.readyState !== WebSocket.OPEN) return;

      addUserPrompt(text);
      promptInput.value = '';
      promptInput.disabled = true;

      ws.send(JSON.stringify({ type: 'prompt', prompt: text }));
      output.scrollTop = output.scrollHeight;
    }

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submit();
    });

    if (location.protocol === 'file:') {
      addSystemLine('enter a host:port and press connect');
      addEmptyAndScroll();
    } else if (isGitHubPages) {
      autoConnect();
    } else {
      connect();
    }
  </script>
</body>
</html>
