<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openstacks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #1e1e2e; --surface: #282840; --text: #d4d4e8; --accent: #7c7cff; --border: #3a3a5c; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
    #messages { flex: 1; overflow-y: auto; padding: 12px 0; }
    .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.5; }
    .msg.user { background: var(--surface); border: 1px solid var(--border); }
    .msg.assistant { background: #1a1a30; border: 1px solid var(--border); }
    .msg .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; color: var(--accent); }
    .msg.error { background: #3a1a1a; border: 1px solid #5c2a2a; color: #ff8888; }
    #input-area { display: flex; gap: 8px; padding: 12px 0 4px; }
    #prompt { flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    #prompt:focus { border-color: var(--accent); }
    #send { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="app">
    <h1>openstacks</h1>
    <div id="messages"></div>
    <div id="input-area">
      <input id="prompt" type="text" placeholder="Type a prompt..." autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>
  <script>
    const messages = document.getElementById('messages');
    const prompt = document.getElementById('prompt');
    const send = document.getElementById('send');

    let streaming = false;
    let currentAssistantEl = null;
    let currentText = '';

    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => { send.disabled = false; };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'start') {
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'msg assistant';
        currentAssistantEl.innerHTML = '<div class="label">assistant</div><div class="content typing"></div>';
        messages.appendChild(currentAssistantEl);
        currentText = '';
        streaming = true;
      } else if (msg.type === 'text' && currentAssistantEl) {
        currentText += msg.text;
        currentAssistantEl.querySelector('.content').textContent = currentText;
        messages.scrollTop = messages.scrollHeight;
      } else if (msg.type === 'end') {
        if (currentAssistantEl) currentAssistantEl.querySelector('.content').classList.remove('typing');
        currentAssistantEl = null;
        streaming = false;
        send.disabled = false;
        prompt.focus();
      } else if (msg.type === 'error') {
        const err = document.createElement('div');
        err.className = 'msg error';
        err.textContent = msg.message;
        messages.appendChild(err);
        streaming = false;
        send.disabled = false;
        prompt.focus();
      }
    };

    ws.onclose = () => {
      const note = document.createElement('div');
      note.className = 'msg error';
      note.textContent = 'Connection closed';
      messages.appendChild(note);
      send.disabled = true;
    };

    function submit() {
      const text = prompt.value.trim();
      if (!text || streaming) return;

      const userEl = document.createElement('div');
      userEl.className = 'msg user';
      userEl.innerHTML = '<div class="label">you</div><div class="content"></div>';
      userEl.querySelector('.content').textContent = text;
      messages.appendChild(userEl);

      prompt.value = '';
      send.disabled = true;

      ws.send(JSON.stringify({ type: 'prompt', prompt: text }));
      messages.scrollTop = messages.scrollHeight;
    }

    send.addEventListener('click', submit);
    prompt.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
    prompt.focus();
  </script>
</body>
</html>
