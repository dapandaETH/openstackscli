<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openstacks</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #terminal { width: 100vw; height: 100vh; padding: 8px; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script type="module">
    import { Terminal } from 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm';
    import { AttachAddon } from 'https://cdn.jsdelivr.net/npm/@xterm/addon-attach@0.11.0/+esm';

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 14,
      theme: { background: '#1e1e1e', foreground: '#d4d4d4' }
    });
    term.open(document.getElementById('terminal'));

    const ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => {
      const addon = new AttachAddon(ws);
      term.loadAddon(addon);
    };
    term.focus();
  </script>
</body>
</html>
