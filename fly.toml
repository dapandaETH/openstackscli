app = "openstacks"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["tls", "http", "websocket"]
    port = "443"

  [[services.ports]]
    handlers = ["http"]
    port = "80"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

[machine]
  auto_rollback = true
